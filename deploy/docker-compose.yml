version: "3.8"

x-podman:
  compose_project_name: free-callcenter

services:
  postgres:
    image: registry.cn-beijing.aliyuncs.com/wenning/postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: free_callcenter
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - voip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15432:5432"

  freeswitch:
    image: registry.cn-beijing.aliyuncs.com/wenning/freeswitch:edge
    container_name: freeswitch
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5080:5080/udp"
      - "5080:5080/tcp"
      - "8021:8021/tcp"
    volumes:
      - ./fsconf:/etc/freeswitch
      - ./cdr-csv:/var/log/freeswitch/cdr-csv
    networks:
      - voip-network
    extra_hosts:
      # 使 FreeSWITCH 能通过 host.docker.internal 访问宿主机的 AI 服务
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  live_voice_call:
    build: ../live_voice_call/backend
    container_name: live_voice_call
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - HOST=0.0.0.0
      - FS_PORT=8080
      - ASR_PROVIDER=funasr
      - LLM_PROVIDER=openai
      - TTS_PROVIDER=edge
      - OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENAI_API_KEY=${DASHSCOPE_API_KEY:-sk-4544fb0d64a14eea96fd2ff4f8565768}
      - OPENAI_MODEL=deepseek-v4-flash
      - FUNASR_MODEL=paraformer
      - FUNASR_SILENCE_THRESHOLD=800
      - FUNASR_END_SILENCE_MS=300
      - ASR_SAMPLE_RATE=16000
      - ENABLE_GREETING=true
      - ENABLE_HTTP_BRIDGE=false
    networks:
      - voip-network

  springboot:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: springboot
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/free_callcenter
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123456
      - FREESWITCH_ESL_HOST=freeswitch
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=ClueCon
    networks:
      - voip-network
    depends_on:
      postgres:
        condition: service_healthy
      freeswitch:
        condition: service_started

networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  maven_cache:
  live_voice_call_models: